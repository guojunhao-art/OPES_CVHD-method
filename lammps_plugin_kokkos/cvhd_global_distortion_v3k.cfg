# V3k-hybrid-perf input file for fix cvhd/global/distortion
# Adds 2D damping-line max and small Kokkos-prep cleanups.

carbon_type = 1
hydrogen_type = 2

output_file = cvhd_v3k.colvar
output_stride = 100
compute_stride = 1

# safe: rebuild local-index Kokkos pair cache after neighbor rebuilds.
# ref_only: rebuild only after setup/reset/rebuild_ref; use only with single MPI rank and atom sorting off.
kk_pair_cache_policy = safe

# Experimental Kokkos fused neighbor-list backend.
# 1: compute ccbb/chbb/ccbf and their forces in a single neighbor-list traversal.
# 0: use V3g path: Kokkos breaking backend plus CPU ccbf fallback.
kk_fused_neighbor_enable = 1
kk_max_cc_partners = 8
kk_max_ch_partners = 8

# Internal timing diagnostics. 0 disables all timer overhead.
cvhd_timer_enable = 0
cvhd_timer_stride = 1000
cvhd_timer_reset_each_print = 1

cvhd_power = 6
cv1_cutoff_cc = 0.4194
cv1_cutoff_ch = 0.6000
cv2_cutoff_ccform = 0.3200

cc_form_candidate_rmax = 3.0

bias_enable = 1

# 1: OPES on (cv1, cv2)
# 0: OPES only on cv1
opes_use_cv2 = 1

# opes_temperature is read from cfg, but kBT uses LAMMPS force->boltz.
opes_temperature = 1500.0
opes_barrier = 10.0
opes_biasfactor = 0.0
opes_pace = 1000
opes_adaptive_sigma_stride = 0
opes_kernel_cutoff = 4.0

# 0 disables compression. 1.0 is a practical OPES-style starting point.
opes_compression_threshold = 1.0
opes_recursive_merge = 1

opes_epsilon = 0.0
opes_fixed_sigma = 0
opes_no_zed = 1

# Adaptive E / c(t) slope gate.
opes_barrier_increment = 0.0
opes_barrier_max = 0.0
opes_ct_window = 10
opes_ct_min_stable_windows = 3
opes_ct_slope_threshold = 0.015

# Damped E increment:
# 1D: evaluate Vboost at cv1 = opes_dE_damp_pos_cv1.
# 2D: evaluate max Vboost along cv1=pos_cv1 and cv2=pos_cv2 lines.
# opes_dE_damp_grid controls the number of grid points on each line.
opes_dE_damp_enable = 1
opes_dE_damp_slowf = 3.0
opes_dE_damp_pos_cv1 = 0.8
opes_dE_damp_pos_cv2 = 0.8
opes_dE_damp_grid = 10

# CVHD event reset.
cvhd_reset_enable = 1
cvhd_event_threshold = 1.0
cvhd_waittime = 10000

cc_break_enable = 1
cc_break_ref = 1.55
cc_break_rmin = 0.0
cc_break_rmax = 1.80
cc_break_power = 6

ch_break_enable = 1
ch_break_ref = 1.05
ch_break_rmin = 0.0
ch_break_rmax = 1.30
ch_break_power = 10

cc_form_enable = 1
cc_form_ref = 2.50
cc_form_power = 10
